services:
  # Backend Service (Golang)
  backend:
    # 🚨 เปลี่ยนตรงนี้ให้เป็น Username Docker Hub ของคุณ
    image: poomrapee678/ecommerce-backend:latest
    container_name: ecommerce-backend
    ports:
      # ใส่ค่า Default 8080 ไว้เผื่อกรณีหาตัวแปร PORT ไม่เจอ
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - GIN_MODE=release
      - PORT=${PORT:-8080}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    # สั่งให้ Docker อ่านไฟล์ .env 
    env_file:
      - .env
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-8080}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Service (React + Nginx)
  frontend:
    # 🚨 เปลี่ยนตรงนี้ให้เป็น Username Docker Hub ของคุณ
    image: poomrapee678/ecommerce-frontend:latest
    container_name: ecommerce-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      # เปลี่ยนจาก /health เป็น / เพราะ Nginx ปกติจะคืนค่า 200 ที่หน้าแรก (เว้นแต่จะตั้งค่า Nginx ไว้เฉพาะ)
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  ecommerce-network:
    driver: bridge
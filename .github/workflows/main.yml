name: Deploy Production

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================================================
      # 🚨 ส่วนจำลองระบบและรัน Automated Test
      # =========================================================
      
      # 1. สร้างไฟล์ .env จำลองให้ Docker Compose รันติด
      # DATABASE_URL ตั้งใจปล่อยว่าง → backend จะใช้ SQLite แทน ไม่ต้องรอ TCP timeout จาก Supabase
      - name: Create Dummy .env for Testing
        run: |
          touch .env
          echo "PORT=8080" >> .env
          echo "GIN_MODE=release" >> .env
          echo "JWT_SECRET=ci-test-secret" >> .env

      # 2. สั่งรัน Backend & Frontend ขึ้นมาบนเครื่อง CI
      - name: Start Services for Testing
        run: docker compose up -d --build

      # 2.1 แสดง container logs เพื่อ debug เมื่อ backend unhealthy
      - name: Show Backend Logs (debug)
        if: always()
        run: |
          echo "=== Backend container logs ==="
          docker logs ecommerce-backend || echo "(no logs available)"
          echo "=== Backend container inspect ==="
          docker inspect ecommerce-backend --format='{{json .State}}' || true

      # 3. ติดตั้ง Node.js และ Playwright
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          
      - name: Install dependencies
        run: npm ci 
        # 💡 ถ้ารันแล้ว Error หา package.json ไม่เจอ ให้เพิ่มบรรทัดล่างนี้ (เอาเครื่องหมาย # ออก)
        # working-directory: ./frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        # working-directory: ./frontend

      # 4. สั่งรัน Playwright Test
      - name: Run Playwright tests
        run: npx playwright test
        # working-directory: ./frontend

      # 5. เก็บผลลัพธ์ (Trace/Video) ไว้ดูเผื่อเทสต์พัง
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/ 
          retention-days: 30

      # =========================================================
      # ✅ ถ้า Test ผ่านฉลุย ถึงจะทำงานส่วนล่างนี้ต่อ
      # =========================================================

      - name: Check Secret Availability
        run: |
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::CRITICAL ERROR: Secret is EMPTY! (หากุญแจไม่เจอ)"
            exit 1
          else
            echo "SUCCESS: Secret detected"
          fi
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest

      - name: Deploy to OpenLandscape Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OLS_HOST }}
          username: ${{ secrets.OLS_USERNAME }}
          key: ${{ secrets.OLS_SSH_KEY }}
          script: |
            cd /root/myapp
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            
      - name: Deploy to AWS EC2 Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # Path ถูกต้องตามโฟลเดอร์บน AWS แล้ว
            cd /home/ubuntu/E-commerce-miniproject
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f